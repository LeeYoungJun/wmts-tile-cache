server:
  port: 3000
  logLevel: info
  corsOrigins: "*"

cache:
  directory: ./cache
  maxAgeDays: 30
  capabilitiesTtlSeconds: 300

services:
  # -------------------------------------------------------
  # 예시 1: VWORLD 배경지도 (KVP 방식)
  # 실제 사용 시 apiKey를 발급받아 .env 파일에 VWORLD_API_KEY=xxx 설정
  # -------------------------------------------------------
  - name: world-base
    label: "VWorld 배경지도"
    tileDefaults:
      style: "default"
      tilematrixset: "GoogleMapsCompatible"
      ext: "png"
    upstream:
      url: "https://api.vworld.kr/req/wmts/1.0.0"
      style: rest
      restTemplate: "/{apiKey}/{layer}/{z}/{y}/{x}.{ext}"
      extraParams:
        apiKey: "${VWORLD_API_KEY}"
    layers:
      allowlist:
        - "Base"
        - "Satellite"
        - "white"
        - "midnight"
    cache:
      maxAgeDays: 7

  # -------------------------------------------------------
  # 예시 2: OpenStreetMap 슬리피맵 (TMS 방식 - WMTS로 래핑)
  # -------------------------------------------------------
  - name: osm
    label: "OpenStreetMap"
    upstream:
      url: "https://tile.openstreetmap.org"
      style: tms
      restTemplate: "/{z}/{x}/{y}.png"
    layers:
      allowlist: []
    cache:
      maxAgeDays: 1
    headers:
      User-Agent: "wmts-tile-cache/1.0 (yjlee@sphinfo.co.kr)"

  # -------------------------------------------------------
  # 샘플: 레이어 WMTS (KVP) **url 추후 실제 제공하는 서버로 변경해야함 임시 geoserver 샘플 URL로 설정
  # -------------------------------------------------------
  - name: layer-tile-cache
    label: "layer-tile-cache"
    upstream:
      url: "http://34.64.169.193:8080/geoserver/gwc/service/wmts"
      style: kvp
      kvpDefaults:
        VERSION: "1.0.0"
        FORMAT: "image/png"
    layers:
      allowlist: []
    cache:
      maxAgeDays: 7

  # -------------------------------------------------------
  # 예시 3: 일반 WMTS REST 서비스
  # -------------------------------------------------------

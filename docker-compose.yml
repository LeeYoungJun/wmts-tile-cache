version: "3.9"

services:
  wmts-tile-cache:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wmts-tile-cache
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-3000}
      - CONFIG_PATH=${CONFIG_PATH:-./config.yaml}
    volumes:
      - "${CACHE_HOST_DIR:-./cache}:/app/cache"
      - "${CONFIG_HOST_PATH:-./config.yaml}:/app/config.yaml:ro"
